<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Складской мониторинг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1100; }
        .product-card { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">Складской мониторинг</h1>

    <!-- Toast для уведомлений -->
    <div class="toast-container">
        <div id="errorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="5000">
            <div class="toast-header bg-danger text-white">
                <strong class="me-auto">Ошибка</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="errorMessage"></div>
        </div>
        <div id="successToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Успех</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="successMessage"></div>
        </div>
    </div>

    <!-- Панель входа -->
    <div id="loginPanel" class="card mb-4">
        <div class="card-body">
            <h5>Авторизация</h5>
            <input type="text" id="username" class="form-control mb-2" placeholder="Username" value="admin">
            <input type="password" id="password" class="form-control mb-2" placeholder="Password" value="123">
            <button class="btn btn-primary" onclick="login()">Войти</button>
        </div>
    </div>

    <!-- Основной контент (после входа) -->
    <div id="mainContent" style="display:none;">
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">Добавить товар</div>
                    <div class="card-body">
                        <input type="text" id="productName" class="form-control mb-2" placeholder="Название">
                        <input type="text" id="productSku" class="form-control mb-2" placeholder="SKU">
                        <input type="number" id="productStock" class="form-control mb-2" placeholder="Начальный остаток">
                        <input type="number" id="productPrice" class="form-control mb-2" placeholder="Цена">
                        <input type="number" id="reorderPoint" class="form-control mb-2" placeholder="Точка заказа (мин. остаток)" value="5">
                        <input type="number" id="safetyStock" class="form-control mb-2" placeholder="Страховой запас" value="2">
                        <button class="btn btn-success" onclick="createProduct()">Создать товар</button>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-header">Записать движение</div>
                    <div class="card-body">
                        <select id="movementProductId" class="form-select mb-2"></select>
                        <input type="number" id="movementQuantity" class="form-control mb-2" placeholder="Количество">
                        <select id="movementType" class="form-select mb-2">
                            <option value="Receipt">Приход</option>
                            <option value="Sale">Продажа</option>
                        </select>
                        <button class="btn btn-primary" onclick="recordMovement()">Отправить</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">Прогноз</div>
                    <div class="card-body">
                        <select id="forecastProductId" class="form-select mb-2"></select>
                        <button class="btn btn-warning mb-2" onclick="generateForecast()">Сгенерировать прогноз</button>
                        <div id="forecastResult"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Список товаров</div>
            <div class="card-body">
                <table class="table table-bordered" id="productsTable">
                    <thead>
                       <thead>
    <tr><th>Название</th><th>SKU</th><th>Остаток</th><th>Цена</th><th>Прогноз</th><th>Удалить</th></tr>
                        </thead>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let token = null;
    let warehouses = [];
    let selectedWarehouseId = null;
    const apiBase = '/api';

    // Получение токена из localStorage при загрузке
    const savedToken = localStorage.getItem('token');
    if (savedToken) {
        token = savedToken;
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadProducts();
        loadWarehouses();
        loadProductSelects();
    }

    async function apiCall(endpoint, method = 'GET', body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const response = await fetch(`${apiBase}${endpoint}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null
    });
    if (!response.ok) {
        let errorText = await response.text();
        throw new Error(errorText);
    }
    // Если статус 204 No Content или нет контента, вернуть null
    if (response.status === 204 || response.headers.get('content-length') === '0') {
        return null;
    }
    // Пытаемся разобрать JSON, если есть
    const contentType = response.headers.get('content-type');
    if (contentType && contentType.includes('application/json')) {
        return await response.json();
    }
    return null;
}

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const data = await apiCall('/Auth/login', 'POST', { username, password });
            token = data.token;
            localStorage.setItem('token', token);
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            await loadWarehouses();
            await loadProducts();
            await loadProductSelects();
        } catch (err) {
            showError('Ошибка авторизации: ' + err.message);
        }
    }

    async function loadWarehouses() {
        try {
            warehouses = await apiCall('/Warehouse');
            if (warehouses.length === 0) {
                showError('Нет ни одного склада. Создайте склад через Swagger POST /api/Warehouse');
            } else {
                selectedWarehouseId = warehouses[0].id;
            }
        } catch (err) {
            showError('Не удалось загрузить склады: ' + err.message);
        }
    }

    async function loadProducts() {
        try {
                const products = await apiCall('/Products');
                const tbody = document.querySelector('#productsTable tbody');
                tbody.innerHTML = '';
                for (const p of products) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.sku;
                row.insertCell(2).innerText = p.currentStock;
                row.insertCell(3).innerText = p.unitPrice;

                const forecastBtn = document.createElement('button');
                forecastBtn.innerText = 'Прогноз';
                forecastBtn.className = 'btn btn-sm btn-info me-1';
                forecastBtn.onclick = () => showForecastForProduct(p.id);
                row.insertCell(4).appendChild(forecastBtn);

                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = 'Удалить';
                deleteBtn.className = 'btn btn-sm btn-danger';
                deleteBtn.onclick = () => deleteProduct(p.id);
                row.insertCell(5).appendChild(deleteBtn);
            }
        } catch (err) {
            showError('Ошибка загрузки товаров: ' + err.message);
        }
    }

    async function loadProductSelects() {
        try {
            const products = await apiCall('/Products');
            const movementSelect = document.getElementById('movementProductId');
            const forecastSelect = document.getElementById('forecastProductId');
            movementSelect.innerHTML = '';
            forecastSelect.innerHTML = '';
            for (const p of products) {
                const opt1 = document.createElement('option');
                opt1.value = p.id;
                opt1.innerText = p.name;
                movementSelect.appendChild(opt1);
                const opt2 = opt1.cloneNode(true);
                forecastSelect.appendChild(opt2);
            }
        } catch (err) {
            showError('Ошибка загрузки списка товаров: ' + err.message);
        }
    }

    async function createProduct() {
        const name = document.getElementById('productName').value;
        const sku = document.getElementById('productSku').value;
        const currentStock = parseInt(document.getElementById('productStock').value) || 0;
        const unitPrice = parseFloat(document.getElementById('productPrice').value) || 0;
        const reorderPoint = parseInt(document.getElementById('reorderPoint').value) || 5;
        const safetyStock = parseInt(document.getElementById('safetyStock').value) || 2;
        try {
            await apiCall('/Products', 'POST', { 
                name, sku, currentStock, reorderPoint, safetyStock, unitPrice,
                description: "" 
            });
            showSuccess('Товар успешно создан');
            await loadProducts();
            await loadProductSelects();
            // Очистка формы
            document.getElementById('productName').value = '';
            document.getElementById('productSku').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('reorderPoint').value = '5';
            document.getElementById('safetyStock').value = '2';
        } catch (err) {
            showError('Ошибка создания товара: ' + err.message);
        }
    }

    async function deleteProduct(productId) {
        if (!confirm('Вы уверены, что хотите удалить этот товар?')) return;
        try {
            await apiCall(`/Products/${productId}`, 'DELETE');
            showSuccess('Товар удалён');
            await loadProducts();
            await loadProductSelects();
        } catch (err) {
            showError('Ошибка удаления: ' + err.message);
        }
    }

    async function recordMovement() {
        const productId = document.getElementById('movementProductId').value;
        const quantity = parseInt(document.getElementById('movementQuantity').value);
        const movementType = document.getElementById('movementType').value;
        if (isNaN(quantity)) {
            showError('Введите количество');
            return;
        }
        if (!selectedWarehouseId) {
            showError('Нет доступных складов. Создайте склад через Swagger.');
            return;
        }
        try {
            await apiCall('/StockMovements', 'POST', { 
                productId, 
                quantity, 
                movementType,
                warehouseId: selectedWarehouseId
            });
            showSuccess('Движение записано');
            await loadProducts();
            document.getElementById('movementQuantity').value = '';
        } catch (err) {
            showError('Ошибка записи движения: ' + err.message);
        }
    }

    async function generateForecast() {
        const productId = document.getElementById('forecastProductId').value;
        try {
            await apiCall(`/Forecast/generate/${productId}?forecastDays=30`, 'POST');
            const latest = await apiCall(`/Forecast/latest/${productId}`);
            const forecastDiv = document.getElementById('forecastResult');
            if (latest) {
                forecastDiv.innerHTML = `
                    <hr>
                    <h6>Прогноз на ${new Date(latest.forecastDate).toLocaleDateString()}</h6>
                    <p>Прогноз: ${latest.predictedDemand}</p>
                    <p>Нижняя граница: ${latest.lowerBound}, Верхняя: ${latest.upperBound}</p>
                `;
                showSuccess('Прогноз сгенерирован');
            } else {
                forecastDiv.innerHTML = '<p class="text-warning">Прогноз не найден</p>';
            }
        } catch (err) {
            showError('Ошибка генерации прогноза: ' + err.message);
        }
    }

    async function showForecastForProduct(productId) {
        try {
            const latest = await apiCall(`/Forecast/latest/${productId}`);
            if (latest) {
                alert(`Прогноз: ${latest.predictedDemand} шт. на ${new Date(latest.forecastDate).toLocaleDateString()}`);
            } else {
                alert('Прогноз не сгенерирован. Нажмите "Сгенерировать прогноз" для этого товара.');
            }
        } catch(e) {
            showError('Ошибка получения прогноза: ' + e.message);
        }
    }

    function showError(message) {
        const errorToastEl = document.getElementById('errorToast');
        document.getElementById('errorMessage').innerText = message;
        const toast = new bootstrap.Toast(errorToastEl);
        toast.show();
    }

    function showSuccess(message) {
        const successToastEl = document.getElementById('successToast');
        document.getElementById('successMessage').innerText = message;
        const toast = new bootstrap.Toast(successToastEl);
        toast.show();
    }
</script>
</body>
</html>
